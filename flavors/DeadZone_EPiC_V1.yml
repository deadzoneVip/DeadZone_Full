id: DeadZone_EPiC_V1
aliases:
  - DeadZone_EPiC
name: DeadZone EPiC
version: v1
profile: epic
patch_levels:
  safe:
    patchpacks:
      - patchpacks/dna
      - patchpacks/props
  full:
    patchpacks:
      - patchpacks/framework
      - patchpacks/settings
      - patchpacks/systemui
      - patchpacks/powerkeeper
      - patchpacks/dna
      - patchpacks/props
      - patchpacks/overlays
      - patchpacks/apps
operations:
  - id: epic_build_prop
    op: append_prop_once
    target: system_build_prop
    key: persist.deadzone.flavor
    value: epic
