# LF normalized for GitHub raw
# Redmi Note 13 Pro 5G (garnet)
# Target OTA:
# garnet-ota_full-OS3.0.304.0.WNRCNXM-user-16.0-d0e642461d.zip
#
# Android 16 / HyperOS 3 China. ROM_REGION auto-detects CNXM -> China
# through main.sh/core/utils.sh from the OTA version string.
#
# TODO: Verify SUPER_SIZE and DYNAMIC_PARTITION_GROUP_SIZE from garnet stock
# firmware before production builds, for example with:
#   fastboot getvar partition-size:super
#   lpdump super.img
# Do not reuse another device's values here.

DEVICE_CODENAME=garnet
DEVICE_BRAND=Xiaomi
DEVICE_SOC=Snapdragon
AUTO_SUPER=true

# super partition metadata. AUTO_SUPER resolves the empty size fields from
# an original super.img when available, or from extracted dynamic image sizes.
SUPER_SIZE=
SUPER_SLOT_MODE=VAB
SUPER_OUTPUT_FORMAT=sparse
SUPER_ACTIVE_SLOT=a
SUPER_GROUP_BASENAME=qti_dynamic_partitions
DYNAMIC_PARTITION_GROUP_NAME=qti_dynamic_partitions
DYNAMIC_PARTITION_GROUP_SIZE=
SUPER_METADATA_SIZE=65536
SUPER_METADATA_SLOTS=2
METADATA_SLOTS=2
SUPER_NAME=super
PARTITION_SUFFIX=_a

# Dynamic partition images expected from payload.bin. This is the kitchen's
# existing Xiaomi/HyperOS-safe default; missing payload partitions are ignored
# during extraction/detection.
DYNAMIC_PARTITIONS="system product system_ext vendor vendor_dlkm system_dlkm odm odm_dlkm mi_ext"

# Fastboot package image policy for Qualcomm Xiaomi devices. Keep required
# images minimal; optional entries are copied only when present in the OTA.
REQUIRED_FASTBOOT_IMAGES="boot.img init_boot.img vendor_boot.img vbmeta.img"
OPTIONAL_FASTBOOT_IMAGES="dtbo.img vbmeta_system.img vbmeta_vendor.img vendor_kernel_boot.img recovery.img abl.img aop.img bluetooth.img cpucp.img devcfg.img dsp.img featenabler.img hyp.img imagefv.img keymaster.img modem.img qupfw.img shrm.img tz.img uefisecapp.img xbl.img xbl_config.img"
VBMETA_IMAGES="vbmeta.img vbmeta_system.img vbmeta_vendor.img"
VBMETA_PATCH_STRATEGY=binary

FASTBOOT_SLOT_MODE=ab_suffix

SUPER_PARTITIONS=(
  system
  product
  system_ext
  vendor
  vendor_dlkm
  system_dlkm
  odm
  odm_dlkm
  mi_ext
)
