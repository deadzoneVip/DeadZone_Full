# LF normalized for GitHub raw
# Device profile template for DeadZone fastboot builds.
# Copy this file to devices/<codename>.conf and fill values from stock firmware
# or lpdump/board config. Keep device-specific metadata here, not in scripts.

DEVICE_CODENAME=
DEVICE_BRAND=
DEVICE_SOC=

# super partition metadata
SUPER_SIZE=
SUPER_SLOT_MODE=VAB
SUPER_OUTPUT_FORMAT=sparse
SUPER_ACTIVE_SLOT=a
SUPER_GROUP_BASENAME=qti_dynamic_partitions
DYNAMIC_PARTITION_GROUP_NAME=
DYNAMIC_PARTITION_GROUP_SIZE=
SUPER_METADATA_SIZE=65536
METADATA_SLOTS=2
SUPER_METADATA_SLOTS=2
SUPER_NAME=super
PARTITION_SUFFIX=_a

# Optional explicit slot group sizes. If unset, VAB keeps active images in
# DYNAMIC_PARTITION_GROUP_SIZE and gives inactive zero-size metadata a small group.
# DYNAMIC_PARTITION_GROUP_SIZE_A=
# DYNAMIC_PARTITION_GROUP_SIZE_B=

# Dynamic partition images expected from payload.bin.
DYNAMIC_PARTITIONS="system product system_ext vendor vendor_dlkm system_dlkm odm odm_dlkm mi_ext"

# Fastboot package image policy.
REQUIRED_FASTBOOT_IMAGES="boot.img init_boot.img vendor_boot.img vbmeta.img"
OPTIONAL_FASTBOOT_IMAGES="dtbo.img vbmeta_system.img vbmeta_vendor.img vendor_kernel_boot.img recovery.img logo.img lk.img tee.img scp.img spmfw.img audio_dsp.img dpm.img mcupm.img pi_img.img gz.img md1img.img my_bigball.img my_carrier.img my_company.img my_engineering.img my_heytap.img my_manifest.img my_preload.img my_product.img my_region.img my_stock.img"
VBMETA_IMAGES="vbmeta.img vbmeta_system.img vbmeta_vendor.img"

# Use ab_suffix for targets like boot_ab/vbmeta_ab, or single for boot/vbmeta.
FASTBOOT_SLOT_MODE=ab_suffix
