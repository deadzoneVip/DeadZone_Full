name: DeadZone ROM Kitchen

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "OTA zip direct download URL"
        required: true
        default: "https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/OS3.0.303.0.WNOCNXM/zircon-ota_full-OS3.0.303.0.WNOCNXM-user-16.0-09c35a83d6.zip"
        type: string
      device_codename:
        description: "Device codename matching devices/<codename>.conf"
        required: true
        default: "zircon"
        type: string
      device_hint:
        description: "Optional Factory v2 device hint; falls back to device_codename"
        required: false
        default: ""
        type: string
      build_name:
        description: "Build name"
        required: true
        default: "DeadZone_v1"
        type: string
      ram_variant:
        description: "Device RAM variant in GB (32 / 64 / 128)"
        required: false
        default: "32"
        type: choice
        options:
          - "32"
          - "64"
          - "128"
      vm_cpus:
        description: "Fly.io VM CPUs (matched to RAM: 32GB=8, 64GB=16, 128GB=32)"
        required: true
        default: "16"
        type: choice
        options:
          - "8"
          - "16"
          - "32"
      vm_memory:
        description: "Fly.io VM Memory in MB (32GB=32768, 64GB=65536, 128GB=131072)"
        required: true
        default: "65536"
        type: choice
        options:
          - "32768"
          - "65536"
          - "131072"
      factory_v2:
        description: "Use Factory v2 flow for build-related output types"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      output_type:
        description: "Output artifact type"
        required: true
        default: "fastboot_zip"
        type: choice
        options:
          - "detect_only"
          - "super_zst"
          - "fastboot_zip"
          - "full_release"
      fs_mode:
        description: "Dynamic partition filesystem handling"
        required: true
        default: "erofs"
        type: choice
        options:
          - "preserve"
          - "erofs"
      vbmeta_mode:
        description: "vbmeta patch mode"
        required: true
        default: "3"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
      patch_level:
        description: "ROM modification level"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "safe"
          - "full"
      profile:
        description: "Optional Factory v2 profile name"
        required: false
        default: ""
        type: string
      variant:
        description: "Factory v2 profile variant"
        required: false
        default: "balanced"
        type: choice
        options:
          - "lite"
          - "balanced"
          - "performance"
          - "extreme"
          - "clean"
      upload_pixeldrain:
        description: "Upload final ZIP to PixelDrain"
        required: true
        default: true
        type: boolean
      notify_telegram:
        description: "Send Telegram notification"
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create or update GitHub Release"
        required: true
        default: true
        type: boolean
      skip_patches:
        description: "Legacy Phase 1 switch; keep true for first builds"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      telegram_msg_id:
        description: "Telegram Message ID for Live Updates (set by bot automatically)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  launch_fly_server:
    name: "DeadZone — ${{ github.event.inputs.device_codename }} (${{ github.event.inputs.ram_variant }}GB RAM) on Fly.io"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create GitHub Release placeholder
        run: |
          gh release create "${{ github.run_id }}" \
            --title "DeadZone ${{ github.event.inputs.build_name }} — ${{ github.event.inputs.device_codename }} (${{ github.event.inputs.ram_variant }}GB)" \
            --notes "Build in progress on Fly.io — started by ${{ github.actor }}" \
            || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build_script for container
        run: |
          chmod +x dz_build_script.sh

      - name: Launch DeadZone build on Fly.io
        run: |
          DEVICE_HINT="${{ github.event.inputs.device_hint }}"
          if [[ -z "$DEVICE_HINT" ]]; then
            DEVICE_HINT="${{ github.event.inputs.device_codename }}"
          fi

          # Use Fly Machines REST API directly — fire and forget, no waiting
          curl -s --fail -X POST \
            "https://api.machines.dev/v1/apps/${{ secrets.FLY_APP_NAME }}/machines" \
            -H "Authorization: Bearer ${{ secrets.FLY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "config": {
                "image": "registry.fly.io/${{ secrets.FLY_APP_NAME }}:latest",
                "restart": {"policy": "no"},
                "auto_destroy": true,
                "vm": {
                  "cpu_kind": "performance",
                  "cpus": ${{ github.event.inputs.vm_cpus }},
                  "memory_mb": ${{ github.event.inputs.vm_memory }}
                },
                "env": {
                  "ROM_URL": "${{ github.event.inputs.rom_url }}",
                  "DEVICE_CODENAME": "${{ github.event.inputs.device_codename }}",
                  "DEVICE_HINT": "'"$DEVICE_HINT"'",
                  "BUILD_NAME": "${{ github.event.inputs.build_name }}",
                  "RAM_VARIANT": "${{ github.event.inputs.ram_variant }}",
                  "OUTPUT_TYPE": "${{ github.event.inputs.output_type }}",
                  "FS_MODE": "${{ github.event.inputs.fs_mode }}",
                  "VBMETA_MODE": "${{ github.event.inputs.vbmeta_mode }}",
                  "PATCH_LEVEL": "${{ github.event.inputs.patch_level }}",
                  "FACTORY_V2": "${{ github.event.inputs.factory_v2 }}",
                  "BUILD_PROFILE": "${{ github.event.inputs.profile }}",
                  "BUILD_VARIANT": "${{ github.event.inputs.variant }}",
                  "SKIP_PATCHES": "${{ github.event.inputs.skip_patches }}",
                  "UPLOAD_PIXELDRAIN": "${{ github.event.inputs.upload_pixeldrain }}",
                  "CREATE_GITHUB_RELEASE": "${{ github.event.inputs.create_github_release }}",
                  "NOTIFY_TELEGRAM": "false",
                  "TELEGRAM_BOT_TOKEN": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                  "TELEGRAM_CHAT_ID": "${{ secrets.TELEGRAM_CHAT_ID }}",
                  "TELEGRAM_GROUP_ID": "${{ secrets.TELEGRAM_GROUP_ID }}",
                  "TELEGRAM_MSG_ID": "${{ github.event.inputs.telegram_msg_id }}",
                  "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}",
                  "PIXELDRAIN_API_KEY": "${{ secrets.PIXELDRAIN_API_KEY }}",
                  "GITHUB_REPOSITORY": "${{ github.repository }}",
                  "RUN_ID": "${{ github.run_id }}",
                  "ACTOR": "${{ github.actor }}"
                }
              }
            }'

          echo "Fly machine created via REST API — build running independently"
