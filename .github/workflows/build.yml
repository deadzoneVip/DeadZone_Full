name: DeadZone ROM Kitchen

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "OTA zip direct download URL"
        required: true
        default: "https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/OS3.0.303.0.WNOCNXM/zircon-ota_full-OS3.0.303.0.WNOCNXM-user-16.0-09c35a83d6.zip"
        type: string
      device_codename:
        description: "Device codename matching devices/<codename>.conf"
        required: true
        default: "zircon"
        type: string
      device_hint:
        description: "Optional Factory v2 device hint; falls back to device_codename"
        required: false
        default: ""
        type: string
      build_name:
        description: "Build name"
        required: true
        default: "DeadZone_v1"
        type: string
      factory_v2:
        description: "Use Factory v2 flow for build-related output types"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      output_type:
        description: "Output artifact type"
        required: true
        default: "fastboot_zip"
        type: choice
        options:
          - "detect_only"
          - "super_zst"
          - "fastboot_zip"
          - "full_release"
      fs_mode:
        description: "Dynamic partition filesystem handling"
        required: true
        default: "erofs"
        type: choice
        options:
          - "preserve"
          - "erofs"
      vbmeta_mode:
        description: "vbmeta patch mode"
        required: true
        default: "3"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
      patch_level:
        description: "ROM modification level"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "safe"
          - "full"
      profile:
        description: "Optional Factory v2 profile name"
        required: false
        default: ""
        type: string
      variant:
        description: "Factory v2 profile variant"
        required: false
        default: "balanced"
        type: choice
        options:
          - "lite"
          - "balanced"
          - "performance"
          - "extreme"
          - "clean"
      upload_pixeldrain:
        description: "Upload final ZIP to PixelDrain"
        required: true
        default: true
        type: boolean
      notify_telegram:
        description: "Send Telegram notification"
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create or update GitHub Release"
        required: true
        default: true
        type: boolean
      skip_patches:
        description: "Legacy Phase 1 switch; keep true for first builds"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  kitchen:
    name: Build DeadZone package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Disk before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker rmi $(docker image ls -aq) 2>/dev/null || true
          echo "=== Disk after ==="
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            aria2 \
            unzip \
            zip \
            p7zip-full \
            zstd \
            brotli \
            lz4 \
            jq \
            file \
            curl \
            git \
            gh \
            ca-certificates \
            tar \
            xz-utils \
            e2fsprogs \
            erofs-utils \
            android-sdk-libsparse-utils

      - name: Setup tools
        run: |
          bash core/setup_tools.sh

      - name: Debug tool paths
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -lah bin || true
          echo "=== tool paths ==="
          which payload-dumper-go lpmake lpdump lpdumps lpunpack simg2img img2simg zstd brotli lz4 gh || true
          echo "=== tool verification log ==="
          cat logs/tool-verification.log 2>/dev/null || true

      - name: Run DeadZone kitchen
        env:
          BUILD_NAME: ${{ github.event.inputs.build_name }}
          FS_MODE: ${{ github.event.inputs.fs_mode }}
          VBMETA_MODE: ${{ github.event.inputs.vbmeta_mode }}
          PATCH_LEVEL: ${{ github.event.inputs.patch_level }}
          UPLOAD_PIXELDRAIN: ${{ github.event.inputs.upload_pixeldrain }}
          NOTIFY_TELEGRAM: ${{ github.event.inputs.notify_telegram }}
          CREATE_GITHUB_RELEASE: ${{ github.event.inputs.create_github_release }}
          FACTORY_V2: ${{ github.event.inputs.factory_v2 }}
          BUILD_PROFILE: ${{ github.event.inputs.profile }}
          BUILD_VARIANT: ${{ github.event.inputs.variant }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x main.sh core/*.sh bin/* 2>/dev/null || true
          bash -n main.sh core/*.sh
          DEVICE_HINT="${{ github.event.inputs.device_hint }}"
          if [[ -z "$DEVICE_HINT" ]]; then
            DEVICE_HINT="${{ github.event.inputs.device_codename }}"
          fi
          ./main.sh \
            "${{ github.event.inputs.rom_url }}" \
            "$DEVICE_HINT" \
            "${{ github.event.inputs.skip_patches }}" \
            "${{ github.event.inputs.output_type }}" \
            "${{ github.event.inputs.fs_mode }}" \
            "${{ github.event.inputs.vbmeta_mode }}" \
            "${{ github.event.inputs.patch_level }}"

      - name: Output info
        if: always()
        run: |
          echo "=== output/ ==="
          ls -lh output/ 2>/dev/null || true
          echo "=== output/images/ ==="
          ls -lh output/images/ 2>/dev/null || true
          echo "=== output/logs/ ==="
          ls -lh output/logs/ 2>/dev/null || true
          echo "=== output_final/ ==="
          ls -lh output_final/ 2>/dev/null || true
          echo "=== partitions.tsv ==="
          cat partitions.tsv 2>/dev/null || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-${{ github.event.inputs.device_codename }}-failure-logs
          path: |
            output/logs/
            output/manifest/
            logs/
            partitions.tsv
          retention-days: 7

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-${{ github.event.inputs.device_codename }}-${{ github.event.inputs.output_type }}
          path: |
            output/super.img.zst
            output/images/super.img
            output_final/
            output/logs/
            output/manifest/
            partitions.tsv
          retention-days: 7
