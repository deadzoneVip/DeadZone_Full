name: DeadZone ROM Kitchen

on:
  workflow_dispatch:
    inputs:
      rom_url:
        required: true
        type: string
      device_codename:
        required: true
        type: string
      device_hint:
        required: false
        type: string
      build_name:
        required: true
        type: string
      ram_variant:
        required: false
        type: string
      vm_cpus:
        required: true
        type: string
      vm_memory:
        required: true
        type: string
      factory_v2:
        required: true
        type: string
      output_type:
        required: true
        type: string
      fs_mode:
        required: true
        type: string
      vbmeta_mode:
        required: true
        type: string
      patch_level:
        required: true
        type: string
      profile:
        required: false
        type: string
      variant:
        required: false
        type: string
      upload_pixeldrain:
        required: true
        type: string
      notify_telegram:
        required: true
        type: string
      create_github_release:
        required: true
        type: string
      skip_patches:
        required: true
        type: string
      telegram_msg_id:
        required: false
        type: string
      telegram_chat_id:
        required: false
        type: string

jobs:
  launch_fly_server:
    name: "DeadZone — Fly.io Build"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create GitHub Release placeholder
        run: |
          gh release create "${{ github.run_id }}" \
            --title "DeadZone ${{ inputs.build_name }} — ${{ inputs.device_codename }}" \
            --notes "Build in progress on Fly.io Cloud Server — started by ${{ github.actor }}" \
            || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Launch Build Server & Detach (OrangeFox Method)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Waking up Fly.io and detaching so GitHub Actions can exit..."
          
          DEVICE_HINT="${{ inputs.device_hint }}"
          if [[ -z "$DEVICE_HINT" ]]; then
            DEVICE_HINT="${{ inputs.device_codename }}"
          fi

          flyctl machine run . \
            --app ${{ secrets.FLY_APP_NAME }} \
            --region ams \
            --vm-cpu-kind performance \
            --vm-cpus ${{ inputs.vm_cpus }} \
            --vm-memory ${{ inputs.vm_memory }} \
            --detach \
            --restart no \
            --env ROM_URL="${{ inputs.rom_url }}" \
            --env DEVICE_CODENAME="${{ inputs.device_codename }}" \
            --env DEVICE_HINT="$DEVICE_HINT" \
            --env BUILD_NAME="${{ inputs.build_name }}" \
            --env RAM_VARIANT="${{ inputs.ram_variant }}" \
            --env OUTPUT_TYPE="${{ inputs.output_type }}" \
            --env FS_MODE="${{ inputs.fs_mode }}" \
            --env VBMETA_MODE="${{ inputs.vbmeta_mode }}" \
            --env PATCH_LEVEL="${{ inputs.patch_level }}" \
            --env FACTORY_V2="${{ inputs.factory_v2 }}" \
            --env BUILD_PROFILE="${{ inputs.profile }}" \
            --env BUILD_VARIANT="${{ inputs.variant }}" \
            --env SKIP_PATCHES="${{ inputs.skip_patches }}" \
            --env UPLOAD_PIXELDRAIN="${{ inputs.upload_pixeldrain }}" \
            --env CREATE_GITHUB_RELEASE="${{ inputs.create_github_release }}" \
            --env NOTIFY_TELEGRAM="${{ inputs.notify_telegram }}" \
            --env TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --env TELEGRAM_CHAT_ID="${{ inputs.telegram_chat_id }}" \
            --env TELEGRAM_MSG_ID="${{ inputs.telegram_msg_id }}" \
            --env GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            --env PIXELDRAIN_API_KEY="${{ secrets.PIXELDRAIN_API_KEY }}" \
            --env GITHUB_REPOSITORY="${{ github.repository }}" \
            --env RUN_ID="${{ github.run_id }}" \
            --env ACTOR="${{ github.actor }}" \
            --env STORAGE_VARIANT="350"
          
          echo "Fly.io server is now independent! GitHub Actions will close now."
